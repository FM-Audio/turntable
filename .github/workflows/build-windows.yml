name: Build Windows GUI

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows-gui:
    name: Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build one-file Windows GUI
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name FM-Audio-REW-Turntable `
            --add-data "software/rew_turntable/assets/fm_audio_logo.png;assets" `
            --paths software/rew_turntable `
            software/rew_turntable/rew_turntable_gui.py

      - name: Package Windows download
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item dist/FM-Audio-REW-Turntable.exe package/
          Copy-Item software/rew_turntable/WINDOWS.md package/README-WINDOWS.md
          Compress-Archive -Path package/* -DestinationPath FM-Audio-REW-Turntable-Windows.zip -Force
          Get-FileHash FM-Audio-REW-Turntable-Windows.zip -Algorithm SHA256 | Format-List

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FM-Audio-REW-Turntable-Windows
          path: FM-Audio-REW-Turntable-Windows.zip
          if-no-files-found: error
