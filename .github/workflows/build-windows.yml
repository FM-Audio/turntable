name: Build GUI Downloads

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-gui:
    name: Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build one-file Windows GUI
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name FM-Audio-REW-Turntable `
            --add-data "software/rew_turntable/assets/fm_audio_logo.png;assets" `
            --paths software/rew_turntable `
            software/rew_turntable/rew_turntable_gui.py

      - name: Package Windows download
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item dist/FM-Audio-REW-Turntable.exe package/
          Copy-Item software/rew_turntable/WINDOWS.md package/README-WINDOWS.md
          Compress-Archive -Path package/* -DestinationPath FM-Audio-REW-Turntable-Windows.zip -Force
          Get-FileHash FM-Audio-REW-Turntable-Windows.zip -Algorithm SHA256 | Format-List

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FM-Audio-REW-Turntable-Windows
          path: FM-Audio-REW-Turntable-Windows.zip
          if-no-files-found: error

      - name: Upload Windows ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FM-Audio-REW-Turntable-Windows.zip

  linux-gui:
    name: Linux Python GUI package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Linux download
        run: |
          set -euo pipefail
          mkdir -p package
          cp software/rew_turntable/rew_turntable_gui.py package/
          cp software/rew_turntable/rew_turntable_runner.py package/
          cp software/rew_turntable/run_gui_linux.sh package/
          cp software/rew_turntable/install_desktop_launcher_linux.sh package/
          cp software/rew_turntable/FM-Audio-REW-Turntable.desktop package/
          mkdir -p package/assets
          cp software/rew_turntable/assets/fm_audio_logo.png package/assets/
          cp software/rew_turntable/LINUX.md package/README-LINUX.md
          chmod +x package/run_gui_linux.sh package/install_desktop_launcher_linux.sh
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          zip_path = Path('FM-Audio-REW-Turntable-Linux.zip')
          with ZipFile(zip_path, 'w', ZIP_DEFLATED) as zf:
              for path in Path('package').rglob('*'):
                  if path.is_file():
                      zf.write(path, path.as_posix())
          PY
          sha256sum FM-Audio-REW-Turntable-Linux.zip

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: FM-Audio-REW-Turntable-Linux
          path: FM-Audio-REW-Turntable-Linux.zip
          if-no-files-found: error

      - name: Upload Linux ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FM-Audio-REW-Turntable-Linux.zip
